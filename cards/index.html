  function getQueryLang(){
    try{ return (new URLSearchParams(location.search)).get('lang') || ''; }catch(e){ return ''; }
  }
  function normalizeLang(lang){
    lang = (lang || '').toLowerCase();
    if(lang.startsWith('en')) return 'en';
    if(lang.startsWith('es')) return 'es';
    if(lang.startsWith('de')) return 'de';
    if(lang.startsWith('pl')) return 'pl';
    if(lang.startsWith('ro')) return 'ro';
    if(lang.startsWith('ru')) return 'ru';
    if(lang.startsWith('cs') || lang.startsWith('cz')) return 'cs';
    return 'en';
  }
  function t(lang, key){
    const L = (I18N && I18N[lang]) ? I18N[lang] : (I18N && I18N.en ? I18N.en : {});
    return (L && L[key]) || (I18N && I18N.en && I18N.en[key]) || key;
  }
  function applyI18n(lang){
    const l = normalizeLang(lang);
    document.documentElement.lang = l;
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if(!key) return;
      el.textContent = t(l, key);
    });
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
      const key = el.getAttribute('data-i18n-placeholder');
      if(!key) return;
      el.setAttribute('placeholder', t(l, key));
    });
    document.title = t(l, 'ui.business_cards_title');
    return l;
  }

  const designs = [...new Set(pages.map(p => p.design))];
  const themes = [...new Set(pages.map(p => p.theme))];

  const langSel = document.getElementById('lang');
  const dSel = document.getElementById('design');
  const tSel = document.getElementById('theme');
  const frame = document.getElementById('frame');
  const openLink = document.getElementById('openLink');
  const sheetLink = document.getElementById('sheetLink');
  const backLink = document.getElementById('backLink');

  function addOptions(sel, values){
    sel.innerHTML='';
    values.forEach(v => { const o=document.createElement('option'); o.value=v; o.textContent=v; sel.appendChild(o); });
  }
  function addLangOptions(sel){
    sel.innerHTML = "";
    (LANGS || []).forEach(it => {
      const o = document.createElement("option");
      o.value = it.code;
      o.textContent = it.label;
      sel.appendChild(o);
    });
  }

  addLangOptions(langSel);
  addOptions(dSel, designs);
  addOptions(tSel, themes);

  let currentLang = 'en';
  let currentFilename = pages[0] ? pages[0].filename : '';

  function localizeSelectOptions(sel, kind){
    try{
      Array.from(sel.options).forEach(opt => {
        const key = `${kind}.${opt.value}`;
        const lbl = t(currentLang, key);
        if(lbl && lbl !== key) opt.textContent = lbl;
      });
    }catch(e){}
  }
  function localizeAllSelects(){
    localizeSelectOptions(dSel, 'design');
    localizeSelectOptions(tSel, 'theme');
  }

  function postLang(){
    try{
      const win = frame.contentWindow;
      if(!win) return;
      win.postMessage({type: 'setLang', lang: currentLang}, '*');
    }catch(e){}
  }

  function persist(){
    localStorage.setItem('card_viewer_state', JSON.stringify({design:dSel.value, theme:tSel.value, lang: currentLang}));
    try{ localStorage.setItem('resume_lang', currentLang); }catch(e){}
  }
  function restore(){
    const urlLang = getQueryLang();
    try{
      const raw = localStorage.getItem('card_viewer_state');
      if(raw){
        const st = JSON.parse(raw);
        if(st.design && designs.includes(st.design)) dSel.value = st.design;
        if(st.theme && themes.includes(st.theme)) tSel.value = st.theme;
        if(st.lang && (LANGS||[]).some(l => l.code === normalizeLang(st.lang))) langSel.value = normalizeLang(st.lang);
      }
    }catch(e){}

    if(urlLang){
      langSel.value = normalizeLang(urlLang);
    } else if(!langSel.value){
      const savedLang = localStorage.getItem('resume_lang');
      if(savedLang) langSel.value = normalizeLang(savedLang);
    }

    currentLang = applyI18n(langSel.value || 'en');
    localizeAllSelects();
    try{ localStorage.setItem('resume_lang', currentLang); }catch(e){}
  }

  function updateLinks(){
    backLink.href = `../index.html?lang=${encodeURIComponent(currentLang)}`;
  }

  function pick(){
    const d = dSel.value;
    const th = tSel.value;
    const match = pages.find(p => p.design===d && p.theme===th) || pages[0];
    currentFilename = match.filename;
    const src = `${match.filename}?lang=${encodeURIComponent(currentLang)}`;
    frame.src = src;
    openLink.href = src;
    sheetLink.href = `sheet.html?lang=${encodeURIComponent(currentLang)}&design=${encodeURIComponent(d)}&theme=${encodeURIComponent(th)}`;
    updateLinks();
    persist();
  }

  dSel.addEventListener('change', pick);
  tSel.addEventListener('change', pick);
  langSel.addEventListener('change', () => {
    currentLang = applyI18n(langSel.value);
    localizeAllSelects();
    updateLinks();
    if(currentFilename) openLink.href = `${currentFilename}?lang=${encodeURIComponent(currentLang)}`;
    sheetLink.href = `sheet.html?lang=${encodeURIComponent(currentLang)}&design=${encodeURIComponent(dSel.value)}&theme=${encodeURIComponent(tSel.value)}`;
    persist();
    postLang();
  });

  frame.addEventListener('load', () => { postLang(); });

  restore();
  pick();
</script>
