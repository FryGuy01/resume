    function normalizeLang(lang){
      const l = String(lang || 'en').toLowerCase();
      if(l.startsWith('es')) return 'es';
      if(l.startsWith('de')) return 'de';
      if(l.startsWith('pl')) return 'pl';
      if(l.startsWith('ro')) return 'ro';
      if(l.startsWith('ru')) return 'ru';
      if(l.startsWith('cs')) return 'cs';
      return 'en';
    }

    function t(lang, key){
      const table = I18N[lang] || I18N.en || {};
      return table[key] || (I18N.en && I18N.en[key]) || key;
    }

    // Translation helpers (Google gtx → MyMemory fallback)
    let __txAbort = null;

    function isProbablyTranslatable(text){
      if (!text) return false;
      const tt = String(text).trim();
      if (!tt) return false;
      if (/^[\w.+-]+@[\w.-]+\.[A-Za-z]{2,}$/.test(tt)) return false;
      if (/^(https?:\/\/|www\.)/i.test(tt)) return false;
      if (/^\+?\d[\d\s().-]{6,}$/.test(tt)) return false;
      if (tt.length <= 14 && /^[A-Z0-9/\s.-]+$/.test(tt)) return false;
      if (!/[A-Za-zÀ-žА-я]/.test(tt)) return false;
      return true;
    }

    async function fetchGoogle(lang, text, signal){
      const url = 'https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl='
        + encodeURIComponent(lang)
        + '&dt=t&q=' + encodeURIComponent(text);
      const res = await fetch(url, { method:'GET', signal });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const json = await res.json();
      if (Array.isArray(json) && Array.isArray(json[0])){
        return json[0].map(part => part && part[0] ? String(part[0]) : '').join('');
      }
      throw new Error('Bad response');
    }

    async function fetchMyMemory(lang, text, signal){
      const url = 'https://api.mymemory.translated.net/get?q=' + encodeURIComponent(text) + '&langpair=en|' + encodeURIComponent(lang);
      const res = await fetch(url, { method:'GET', signal });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const json = await res.json();
      return (json && json.responseData && json.responseData.translatedText) ? String(json.responseData.translatedText) : '';
    }

    async function fetchTranslation(lang, text, signal){
      try{ return await fetchGoogle(lang, text, signal); }catch(e){ return await fetchMyMemory(lang, text, signal); }
    }

    async function translateText(lang, text, cache, signal){
      if(cache[text]) return cache[text];
      const tr = await fetchTranslation(lang, text, signal);
      const cleaned = tr ? String(tr).replace(/\s+/g,' ').trim() : '';
      if(cleaned){ cache[text]=cleaned; return cleaned; }
      return text;
    }

    function collectTextNodes(root){
      const nodes = [];
      const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
        acceptNode(node){
          if(!node || !node.nodeValue) return NodeFilter.FILTER_REJECT;
          if(!node.nodeValue.trim()) return NodeFilter.FILTER_REJECT;
          const parent = node.parentElement;
          if(!parent) return NodeFilter.FILTER_REJECT;
          if(parent.closest('[data-no-tx]')) return NodeFilter.FILTER_REJECT;
          const tag = (parent.tagName||'').toLowerCase();
          if(tag==='script'||tag==='style'||tag==='code'||tag==='pre') return NodeFilter.FILTER_REJECT;
          if(!isProbablyTranslatable(node.nodeValue.trim())) return NodeFilter.FILTER_REJECT;
          return NodeFilter.FILTER_ACCEPT;
        }
      });
      let n;
      while((n=walker.nextNode())) nodes.push(n);
      return nodes;
    }

    async function translateElement(root, lang){
      const l = normalizeLang(lang);
      if(l==='en') return;

      if(__txAbort){ try{ __txAbort.abort(); }catch(e){} }
      __txAbort = new AbortController();

      const cache = {};
      const nodes = collectTextNodes(root);
      nodes.forEach(n=>{ if(n.__orig===undefined) n.__orig=n.nodeValue; n.nodeValue=n.__orig; });

      const uniq=[];
      const map=new Map();
      nodes.forEach(n=>{
        const key=n.nodeValue.trim();
        if(!isProbablyTranslatable(key)) return;
        if(!map.has(key)){ map.set(key,[]); uniq.push(key); }
        map.get(key).push(n);
      });

      let idx=0;
      async function worker(){
        while(idx<uniq.length){
          const i=idx++;
          const orig=uniq[i];
          let tr=orig;
          try{ tr = await translateText(l, orig, cache, __txAbort.signal); }catch(e){ tr=orig; }
          (map.get(orig)||[]).forEach(n=>{ n.nodeValue=tr; });
          await new Promise(r=>setTimeout(r,30));
        }
      }

      await Promise.all([worker(), worker()]);
    }

    function applyAltI18n(root, lang){
      const l = normalizeLang(lang);
      root.querySelectorAll('[data-i18n-alt]').forEach(el => {
        const k = el.getAttribute('data-i18n-alt');
        if(k) el.setAttribute('alt', t(l, k));
      });
    }

    const params = new URLSearchParams(location.search);
    const lang = normalizeLang(params.get('lang') || 'en');
    document.documentElement.lang = lang;
    document.title = t(lang, 'ui.business_card_sheet_title');

    const design = params.get('design') || 'classic';
    const theme  = params.get('theme') || 'light';
    const filename = `card_${design}_${theme}.html`;

    const sheet = document.getElementById('sheet');

    async function render(){
      const res = await fetch(filename, { cache: 'no-store' });
      if (!res.ok) throw new Error('Could not load ' + filename);
      const html = await res.text();
      const doc = new DOMParser().parseFromString(html, 'text/html');
      const card = doc.querySelector('.business-card');
      if (!card) throw new Error('Card markup not found in ' + filename);

      const cardHTML = card.outerHTML;
      for (let i = 0; i < 10; i++){
        const wrap = document.createElement('div');
        wrap.innerHTML = cardHTML;
        const el = wrap.firstElementChild;
        if (!el) continue;
        applyAltI18n(el, lang);
        sheet.appendChild(el);
      }

      await translateElement(sheet, lang);
      applyAltI18n(sheet, lang);
    }

    render().catch(err => {
      sheet.textContent = String(err && err.message ? err.message : err);
    });
  </script>
