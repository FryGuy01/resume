<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Resume Viewer</title>
  <style>
    html,body{height:100%}
    body{font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Helvetica,Arial,sans-serif; margin:0; padding:0; background:#0b0f14; color:#e6e8ee; display:flex; flex-direction:column; min-height:100vh}
    header{padding:18px 18px 12px 18px; border-bottom:1px solid #242b38; background:#0b0f14}
    .row{display:flex; gap:12px; align-items:center; flex-wrap:wrap}
    .stack{margin-top:10px}
    select{padding:8px 10px; border-radius:10px; border:1px solid #242b38; background:#111827; color:#e6e8ee}
    button{padding:8px 10px; border-radius:10px; border:1px solid #242b38; background:#111827; color:#e6e8ee; cursor:pointer}
    button:hover{background:#0f172a}
    a{color:#93c5fd; text-decoration:none}
    a:hover{text-decoration:underline}
    .muted{color:#a6adbb}
    details.panel{margin-top:12px; border:1px solid #242b38; border-radius:14px; background:#0f172a}
    details.panel > summary{cursor:pointer; padding:10px 12px; display:flex; justify-content:space-between; gap:12px}
    details.panel[open] > summary{border-bottom:1px solid #242b38}
    .panel__body{padding:10px 12px}
    main{flex:1; display:flex; min-height:0}
    iframe{flex:1; width:100%; border:0; background:#ffffff}
    @media (max-width: 900px){
      header{padding:14px 14px 10px 14px}
      details.panel{border-radius:12px}
      select,button{width:100%}
      .row.stack{flex-direction:column; align-items:stretch}
      details.panel > summary{flex-direction:column; align-items:flex-start}
    }
  </style>
</head>
<body>
<header>
  <div class="row">
    <div style="font-weight:700" data-i18n="ui.resume_viewer">Resume Viewer</div>
    <div class="muted" data-i18n="ui.pick_layout_theme">Pick a layout + theme. Print inside the resume page for a styled PDF.</div>
  </div>

  <div class="row stack">
    <label class="muted" for="lang" data-i18n="ui.language">Language</label>
    <select id="lang"></select>

    <label class="muted" for="tpl" data-i18n="ui.template">Template</label>
    <select id="tpl"></select>

    <label class="muted" for="theme" data-i18n="ui.theme">Theme</label>
    <select id="theme"></select>

    <a id="openLink" href="#" target="_blank" rel="noopener" data-i18n="ui.open_new_tab">Open in new tab</a>
  </div>

  <details id="controlsPanel" class="panel" open>
    <summary>
      <span data-i18n="ui.more_controls">More controls</span>
      <span class="muted" data-i18n="ui.panel_hint">Details • Sections • Tools</span>
    </summary>
    <div class="panel__body">
      <div class="row">
        <div class="muted" style="margin-right:8px" data-i18n="ui.details">Details</div>
        <label class="muted"><input type="checkbox" id="toggleAcademic" checked style="margin-right:6px"/><span data-i18n="ui.academic_record">Academic record</span></label>
        <label class="muted"><input type="checkbox" id="toggleCourseDesc" checked style="margin-right:6px"/><span data-i18n="ui.course_descriptions">Course descriptions</span></label>
        <label class="muted"><input type="checkbox" id="toggleCourseSkills" checked style="margin-right:6px"/><span data-i18n="ui.course_skills">Course skills</span></label>
        <label class="muted"><input type="checkbox" id="toggleCertDesc" checked style="margin-right:6px"/><span data-i18n="ui.cert_descriptions">Certification descriptions</span></label>
        <label class="muted"><input type="checkbox" id="toggleCertSkills" checked style="margin-right:6px"/><span data-i18n="ui.cert_skills">Certification skills</span></label>
        <label class="muted"><input type="checkbox" id="toggleTrainingDesc" checked style="margin-right:6px"/><span data-i18n="ui.training_explanations">Training explanations</span></label>
        <label class="muted"><input type="checkbox" id="toggleTrainingSkills" checked style="margin-right:6px"/><span data-i18n="ui.training_skills">Training skills</span></label>
        <label class="muted"><input type="checkbox" id="toggleJobDesc" checked style="margin-right:6px"/><span data-i18n="ui.job_explanations">Job explanations</span></label>
        <label class="muted"><input type="checkbox" id="toggleAwardDesc" checked style="margin-right:6px"/><span data-i18n="ui.award_explanations">Award explanations</span></label>
        <label class="muted"><input type="checkbox" id="toggleAppendix" checked style="margin-right:6px"/><span data-i18n="ui.transcript_appendices">Transcript appendices</span></label>
        <span class="muted" style="margin-left:6px" data-i18n="ui.controls_above_resume_note">(Controls live above the resume.)</span>
      </div>

      <div class="row">
        <div class="muted" style="margin-right:8px" data-i18n="ui.sections">Sections</div>
        <button id="expandAll" type="button" data-i18n="ui.expand_all">Expand all</button>
        <button id="collapseAll" type="button" data-i18n="ui.collapse_all">Collapse all</button>
        <span class="muted" style="margin-left:6px" data-i18n="ui.section_click_hint">(You can also click any section heading inside the resume.)</span>
      </div>
      <div class="row">
        <div class="muted" style="margin-right:8px" data-i18n="ui.tools">Tools</div>
        <a id="cardsLink" href="cards/index.html" target="_blank" rel="noopener" data-i18n="ui.business_cards">Business cards</a>
        <span class="muted">•</span>
        <a id="vcardLink" href="cards/contact.vcf" target="_blank" rel="noopener" data-i18n="ui.download_vcard">Download vCard</a>
      </div>
    </div>
  </details>
</header>
<main>
  <iframe id="frame" title="Resume preview" src=""></iframe>
</main>

  function getQueryLang(){
    try{ return (new URLSearchParams(location.search)).get('lang') || ''; }catch(e){ return ''; }
  }
  function normalizeLang(lang){
    lang = (lang || '').toLowerCase();
    if(lang.startsWith('en')) return 'en';
    if(lang.startsWith('es')) return 'es';
    if(lang.startsWith('de')) return 'de';
    if(lang.startsWith('pl')) return 'pl';
    if(lang.startsWith('ro')) return 'ro';
    if(lang.startsWith('ru')) return 'ru';
    if(lang.startsWith('cs') || lang.startsWith('cz')) return 'cs';
    return 'en';
  }
  function t(lang, key){
    const L = (I18N && I18N[lang]) ? I18N[lang] : (I18N && I18N.en ? I18N.en : {});
    return (L && L[key]) || (I18N && I18N.en && I18N.en[key]) || key;
  }
  function applyI18n(lang){
    const l = normalizeLang(lang);
    document.documentElement.lang = l;
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if(!key) return;
      el.textContent = t(l, key);
    });
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
      const key = el.getAttribute('data-i18n-placeholder');
      if(!key) return;
      el.setAttribute('placeholder', t(l, key));
    });
    document.title = t(l, 'ui.resume_viewer');
    return l;
  }

	  const toggleCertDesc = document.getElementById("toggleCertDesc");
	  const toggleCertSkills = document.getElementById("toggleCertSkills");
	  const toggleTrainingDesc = document.getElementById("toggleTrainingDesc");
	  const toggleTrainingSkills = document.getElementById("toggleTrainingSkills");
	  const toggleJobDesc = document.getElementById("toggleJobDesc");
	  const toggleAwardDesc = document.getElementById("toggleAwardDesc");
	  const toggleAppendix = document.getElementById("toggleAppendix");

	  function postToggle(){
	    const win = frame.contentWindow;
	    if(!win) return;
	    // These match the CSS selectors in styles/base.css
	    win.postMessage({type:"setClass", className:"hide-academics", enabled: !(toggleAcademic && toggleAcademic.checked)}, "*");
	    win.postMessage({type:"setClass", className:"hide-course-desc", enabled: !(toggleCourseDesc && toggleCourseDesc.checked)}, "*");
	    win.postMessage({type:"setClass", className:"hide-course-skills", enabled: !(toggleCourseSkills && toggleCourseSkills.checked)}, "*");
	    win.postMessage({type:"setClass", className:"hide-cert-desc", enabled: !(toggleCertDesc && toggleCertDesc.checked)}, "*");
	    win.postMessage({type:"setClass", className:"hide-cert-skills", enabled: !(toggleCertSkills && toggleCertSkills.checked)}, "*");
	    win.postMessage({type:"setClass", className:"hide-training-desc", enabled: !(toggleTrainingDesc && toggleTrainingDesc.checked)}, "*");
	    win.postMessage({type:"setClass", className:"hide-training-skills", enabled: !(toggleTrainingSkills && toggleTrainingSkills.checked)}, "*");
	    win.postMessage({type:"setClass", className:"hide-job-desc", enabled: !(toggleJobDesc && toggleJobDesc.checked)}, "*");
	    win.postMessage({type:"setClass", className:"hide-award-desc", enabled: !(toggleAwardDesc && toggleAwardDesc.checked)}, "*");
	    win.postMessage({type:"setClass", className:"hide-appendix", enabled: !(toggleAppendix && toggleAppendix.checked)}, "*");
	  }

  document.getElementById("expandAll").addEventListener("click", () => {
    const win = frame.contentWindow;
    if(!win) return;
    win.postMessage({type:"setAllSectionsOpen", open:true}, "*");
  });
  document.getElementById("collapseAll").addEventListener("click", () => {
    const win = frame.contentWindow;
    if(!win) return;
    win.postMessage({type:"setAllSectionsOpen", open:false}, "*");
  });

  function persist(){
    localStorage.setItem("resume_viewer_state", JSON.stringify({
      template: tplSel.value,
      theme: themeSel.value,
      lang: currentLang,
      academic: toggleAcademic.checked,
      courseDesc: toggleCourseDesc.checked,
      courseSkills: toggleCourseSkills.checked,
      certDesc: toggleCertDesc.checked,
      certSkills: toggleCertSkills.checked,
      trainingDesc: toggleTrainingDesc.checked,
      trainingSkills: toggleTrainingSkills.checked,
      jobDesc: toggleJobDesc.checked,
      awardDesc: toggleAwardDesc.checked,
      appendix: toggleAppendix.checked
    }));
    try{ localStorage.setItem('resume_lang', currentLang); }catch(e){}
  }

  function restore(){
    // URL parameter overrides localStorage
    const urlLang = getQueryLang();
    try{
      const raw = localStorage.getItem("resume_viewer_state");
      if(raw){
        const st = JSON.parse(raw);
        if(st.template && templates.includes(st.template)) tplSel.value = st.template;
        if(st.theme && themes.includes(st.theme)) themeSel.value = st.theme;
        if(st.academic !== undefined) toggleAcademic.checked = !!st.academic;
        if(st.courseDesc !== undefined) toggleCourseDesc.checked = !!st.courseDesc;
        if(st.courseSkills !== undefined) toggleCourseSkills.checked = !!st.courseSkills;
        if(st.certDesc !== undefined) toggleCertDesc.checked = !!st.certDesc;
        if(st.certSkills !== undefined) toggleCertSkills.checked = !!st.certSkills;
        if(st.trainingDesc !== undefined) toggleTrainingDesc.checked = !!st.trainingDesc;
        if(st.trainingSkills !== undefined) toggleTrainingSkills.checked = !!st.trainingSkills;
        if(st.jobDesc !== undefined) toggleJobDesc.checked = !!st.jobDesc;
        if(st.awardDesc !== undefined) toggleAwardDesc.checked = !!st.awardDesc;
        if(st.appendix !== undefined) toggleAppendix.checked = !!st.appendix;
        if(st.lang && (LANGS||[]).some(l => l.code === normalizeLang(st.lang))) langSel.value = normalizeLang(st.lang);
      }
    }catch(e){}

    if(urlLang){
      langSel.value = normalizeLang(urlLang);
    } else if(!langSel.value){
      const savedLang = localStorage.getItem('resume_lang');
      if(savedLang) langSel.value = normalizeLang(savedLang);
    }

    currentLang = applyI18n(langSel.value || 'en');
    localizeAllSelects();
    try{ localStorage.setItem('resume_lang', currentLang); }catch(e){}
  }

  function updateLinks(){
    cardsLink.href = `cards/index.html?lang=${encodeURIComponent(currentLang)}`;
  }

  function pick(){
    const tpl = tplSel.value;
    const th = themeSel.value;
    const match = pages.find(p => p.template===tpl && p.theme===th) || pages[0];
    currentFilename = match.filename;
    const src = `${match.filename}?lang=${encodeURIComponent(currentLang)}`;
    frame.src = src;
    openLink.href = src;
    updateLinks();
    persist();
  }

  // Events
  tplSel.addEventListener("change", pick);
  themeSel.addEventListener("change", pick);

  langSel.addEventListener("change", () => {
    currentLang = applyI18n(langSel.value);
    localizeAllSelects();

    updateLinks();
    if(currentFilename) openLink.href = `${currentFilename}?lang=${encodeURIComponent(currentLang)}`;
    persist();
    postLang();
  });

  toggleAcademic.addEventListener("change", () => { postToggle(); persist(); });
  toggleCourseDesc.addEventListener("change", () => { postToggle(); persist(); });
  toggleCourseSkills.addEventListener("change", () => { postToggle(); persist(); });
  toggleCertDesc.addEventListener("change", () => { postToggle(); persist(); });
  toggleCertSkills.addEventListener("change", () => { postToggle(); persist(); });
  toggleTrainingDesc.addEventListener("change", () => { postToggle(); persist(); });
  toggleTrainingSkills.addEventListener("change", () => { postToggle(); persist(); });
  toggleJobDesc.addEventListener("change", () => { postToggle(); persist(); });
  toggleAwardDesc.addEventListener("change", () => { postToggle(); persist(); });
  toggleAppendix.addEventListener("change", () => { postToggle(); persist(); });

  frame.addEventListener("load", () => { postToggle(); postLang(); });

  restore();
  
  pick();
</script>
</body>
</html>
